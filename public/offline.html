<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tô Ligado - Offline</title>
    <style>
        body {
            background-color: #0a0500;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; color: #a855f7; }
        p { font-size: 16px; opacity: 0.8; }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: linear-gradient(to right, #a855f7, #ec4899);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="icon">📡❌</div>
    <h1>Você está fora do radar!</h1>
    <p>O sinal caiu, mas a missão continua em mente.<br>Reconecte-se para atualizar sua pontuação.</p>
    <button onclick="window.location.reload()">TENTAR NOVAMENTE</button>
</body>
</html>
