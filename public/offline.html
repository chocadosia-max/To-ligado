<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS - Sem Sinal</title>
    <style>
        body { background-color: #0a0500; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .icon { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 10px #a855f7); }
        h1 { font-size: 28px; color: #a855f7; margin-bottom: 10px; font-weight: 900; }
        p { font-size: 16px; opacity: 0.7; max-width: 80%; line-height: 1.5; }
        button { margin-top: 30px; padding: 12px 30px; background: linear-gradient(to right, #a855f7, #ec4899); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
    <div class="icon">📡❌</div>
    <h1>VOCÊ ESTÁ FORA DO RADAR!</h1>
    <p>O sinal tático caiu, mas a missão continua em mente. <br>Reconecte-se para atualizar sua pontuação e evitar punições.</p>
    <button onclick="window.location.reload()">REESTABELECER CONEXÃO</button>

</html>
